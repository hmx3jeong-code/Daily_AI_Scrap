<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#07121f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Daily AI Brief" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://generativelanguage.googleapis.com; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'"
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <title>Daily AI Brief</title>
    <style>
      :root {
        --bg-1: #07121f;
        --bg-2: #0e1f35;
        --panel: rgba(255, 255, 255, 0.07);
        --panel-strong: rgba(255, 255, 255, 0.11);
        --line: rgba(255, 255, 255, 0.18);
        --text: #eef5ff;
        --muted: #a8bad3;
        --primary: #7dd3fc;
        --secondary: #34d399;
        --warn: #fecaca;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Pretendard", "SUIT", "Noto Sans KR", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(1000px 420px at 10% -10%, rgba(52, 211, 153, 0.22), transparent),
          radial-gradient(1000px 460px at 90% -5%, rgba(125, 211, 252, 0.24), transparent),
          linear-gradient(145deg, var(--bg-1), var(--bg-2));
        min-height: 100vh;
      }

      .shell {
        width: min(1200px, 94vw);
        margin: 18px auto 64px;
      }

      .hero {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        backdrop-filter: blur(8px);
        padding: 18px 20px;
      }

      .title {
        margin: 0;
        font-size: clamp(1.32rem, 2.4vw, 2rem);
        letter-spacing: 0.01em;
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.94rem;
      }

      .meta {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .meta-pill {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 0.85rem;
      }

      .issue-wrap {
        margin-top: 12px;
      }

      .issue-title {
        font-size: 0.83rem;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .issues {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .issue-chip {
        appearance: none;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        cursor: pointer;
        padding: 7px 11px;
        font-size: 0.84rem;
        transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
      }

      .issue-chip:hover {
        transform: translateY(-1px);
        border-color: rgba(125, 211, 252, 0.7);
        background: rgba(125, 211, 252, 0.16);
      }

      .install-panel {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        padding: 10px;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .install-hint {
        font-size: 0.8rem;
        color: var(--muted);
      }

      .llm-panel {
        margin-top: 14px;
        border: 1px dashed var(--line);
        border-radius: 12px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.02);
      }

      .llm-head {
        font-size: 0.84rem;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .llm-controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .llm-opt-in {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        width: 100%;
        color: var(--muted);
        font-size: 0.8rem;
      }

      .llm-opt-in input {
        margin: 0;
      }

      .llm-controls input {
        flex: 1;
        min-width: 220px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: rgba(0, 0, 0, 0.22);
        color: var(--text);
        padding: 9px 10px;
        font-size: 0.86rem;
      }

      .btn {
        appearance: none;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        cursor: pointer;
        padding: 8px 12px;
        font-size: 0.84rem;
      }

      .btn:hover {
        border-color: rgba(52, 211, 153, 0.75);
        background: rgba(52, 211, 153, 0.14);
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .llm-status {
        font-size: 0.78rem;
        color: var(--muted);
      }

      .topics {
        margin-top: 16px;
        display: grid;
        gap: 14px;
      }

      .topic {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        padding: 14px;
      }

      .topic h2 {
        margin: 0 0 10px;
        color: var(--secondary);
        font-size: 1.02rem;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        padding: 12px;
        position: relative;
      }

      .card + .card {
        margin-top: 10px;
      }

      .card:target,
      .card.focused {
        border-color: rgba(125, 211, 252, 0.85);
        box-shadow: 0 0 0 2px rgba(125, 211, 252, 0.25);
      }

      .card-title {
        margin: 0;
        font-size: 1rem;
        line-height: 1.45;
      }

      .card-title a {
        color: var(--text);
        text-decoration: none;
      }

      .card-title a:hover {
        color: var(--primary);
      }

      .sub {
        margin-top: 6px;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .summary {
        margin: 10px 0 0;
        color: #dce8f7;
        line-height: 1.62;
        font-size: 0.95rem;
      }

      .keywords {
        margin-top: 9px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .kw {
        border-radius: 999px;
        background: rgba(52, 211, 153, 0.16);
        color: #acf3dc;
        font-size: 0.78rem;
        padding: 4px 8px;
      }

      .card-actions {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      .chat-toggle {
        border-color: rgba(125, 211, 252, 0.42);
      }

      .chat-panel {
        margin-top: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.18);
        padding: 10px;
      }

      .chat-log {
        max-height: 260px;
        overflow: auto;
        display: grid;
        gap: 8px;
      }

      .msg {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 0.86rem;
        line-height: 1.55;
      }

      .msg-user {
        background: rgba(125, 211, 252, 0.14);
      }

      .msg-ai {
        background: rgba(52, 211, 153, 0.12);
      }

      .msg-system {
        background: rgba(255, 255, 255, 0.06);
        color: var(--muted);
      }

      .msg-content {
        display: grid;
        gap: 8px;
      }

      .msg-content p {
        margin: 0;
      }

      .msg-content h4,
      .msg-content h5,
      .msg-content h6 {
        margin: 0;
        line-height: 1.4;
        letter-spacing: 0.01em;
      }

      .msg-content h4 {
        font-size: 0.96rem;
        color: #d8ebff;
      }

      .msg-content h5 {
        font-size: 0.9rem;
        color: #c6dcf6;
      }

      .msg-content h6 {
        font-size: 0.86rem;
        color: #b6cae0;
      }

      .msg-content ul,
      .msg-content ol {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 4px;
      }

      .msg-content li {
        margin: 0;
        line-height: 1.5;
      }

      .msg-content strong {
        color: #f8fbff;
      }

      .msg-content code {
        display: inline-block;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 6px;
        padding: 0 6px;
        font-size: 0.8rem;
        background: rgba(0, 0, 0, 0.2);
      }

      .chat-form {
        margin-top: 8px;
        display: grid;
        gap: 8px;
      }

      .chat-input {
        width: 100%;
        min-height: 76px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        padding: 8px 10px;
        font-size: 0.85rem;
      }

      .chat-help {
        font-size: 0.76rem;
        color: var(--muted);
      }

      .history {
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.84rem;
      }

      .history a {
        color: var(--primary);
      }

      .err {
        margin-top: 12px;
        color: var(--warn);
        border: 1px solid rgba(254, 202, 202, 0.35);
        background: rgba(127, 29, 29, 0.26);
        border-radius: 10px;
        padding: 10px 12px;
      }

      @media (max-width: 720px) {
        .shell {
          width: 95vw;
        }

        .hero {
          border-radius: 14px;
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1 class="title">Daily AI Brief</h1>
        <p class="subtitle">권위 있는 출처의 AI 뉴스를 매일 요약합니다.</p>
        <div id="meta" class="meta">
          <span class="meta-pill">로딩 중...</span>
        </div>

        <div class="issue-wrap">
          <div class="issue-title">주요 이슈 (클릭하면 해당 기사로 이동)</div>
          <div id="issues" class="issues"></div>
        </div>

        <div class="install-panel">
          <button id="installBtn" class="btn" type="button" hidden>앱 설치</button>
          <span id="installHint" class="install-hint">모바일 홈 화면 앱 설치를 준비 중입니다.</span>
        </div>

        <div class="llm-panel">
          <div class="llm-head">
            기사 카드별 질문하기 (외부 API 호출 기능, 기본 꺼짐)
          </div>
          <div class="llm-controls">
            <label class="llm-opt-in">
              <input id="llmOptIn" type="checkbox" />
              <span>질문 기능 사용 동의 (외부 API 호출 및 요금 발생 가능)</span>
            </label>
            <input id="geminiKeyInput" type="password" placeholder="Gemini API Key (선택)" />
            <button id="saveKeyBtn" class="btn" type="button">키 저장</button>
            <button id="clearKeyBtn" class="btn" type="button">키 삭제</button>
            <span id="llmStatus" class="llm-status"></span>
          </div>
        </div>

        <div id="history" class="history"></div>
      </section>

      <section id="topics" class="topics"></section>
      <section id="errorBox"></section>
    </main>

    <script>
      const API_KEY_STORAGE = "daily_ai_brief_gemini_key";
      const LLM_OPT_IN_STORAGE = "daily_ai_brief_llm_opt_in";
      const CACHED_LATEST_STORAGE = "daily_ai_brief_cached_latest";
      const CACHED_INDEX_STORAGE = "daily_ai_brief_cached_index";
      const GEMINI_CHAT_MODEL = "gemini-3.1-flash-lite-preview";
      const FETCH_TIMEOUT_MS = 10000;
      const GEMINI_TIMEOUT_MS = 20000;
      const MAX_QUESTION_LENGTH = 500;

      function safeStorageGet(key, fallback = "") {
        try {
          const value = localStorage.getItem(key);
          return value === null ? fallback : value;
        } catch {
          return fallback;
        }
      }

      function safeStorageSet(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch {
          // Ignore storage failures in strict privacy mode.
        }
      }

      function safeStorageRemove(key) {
        try {
          localStorage.removeItem(key);
        } catch {
          // Ignore storage failures in strict privacy mode.
        }
      }

      function safeStorageGetJson(key) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return null;
          return JSON.parse(raw);
        } catch {
          return null;
        }
      }

      function safeStorageSetJson(key, value) {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch {
          // Ignore storage failures in strict privacy mode.
        }
      }

      const state = {
        issueToCardId: new Map(),
        geminiApiKey: safeStorageGet(API_KEY_STORAGE, ""),
        llmOptIn: safeStorageGet(LLM_OPT_IN_STORAGE, "0") === "1",
        deferredInstallPrompt: null,
      };

      const el = {
        meta: document.getElementById("meta"),
        issues: document.getElementById("issues"),
        history: document.getElementById("history"),
        topics: document.getElementById("topics"),
        errorBox: document.getElementById("errorBox"),
        installBtn: document.getElementById("installBtn"),
        installHint: document.getElementById("installHint"),
        llmOptIn: document.getElementById("llmOptIn"),
        geminiKeyInput: document.getElementById("geminiKeyInput"),
        saveKeyBtn: document.getElementById("saveKeyBtn"),
        clearKeyBtn: document.getElementById("clearKeyBtn"),
        llmStatus: document.getElementById("llmStatus"),
      };

      function normalizeHttpUrl(rawUrl) {
        if (typeof rawUrl !== "string" || !rawUrl.trim()) return null;
        try {
          const parsed = new URL(rawUrl, window.location.href);
          if (parsed.protocol !== "http:" && parsed.protocol !== "https:") return null;
          return parsed.href;
        } catch {
          return null;
        }
      }

      function buildSafeReportLink(fileName) {
        if (typeof fileName !== "string") return null;
        if (!/^(daily_ai_brief_\d{4}-\d{2}-\d{2}|latest)\.md$/.test(fileName)) return null;
        return `./data/${fileName}`;
      }

      function escapeHtml(text) {
        return String(text || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatGeneratedAtKst(raw) {
        if (!raw) return "-";
        const parsed = new Date(raw);
        if (Number.isNaN(parsed.getTime())) return raw;
        const formatter = new Intl.DateTimeFormat("ko-KR", {
          timeZone: "Asia/Seoul",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        });
        const parts = {};
        for (const part of formatter.formatToParts(parsed)) {
          if (part.type !== "literal") {
            parts[part.type] = part.value;
          }
        }
        return `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute}:${parts.second} KST`;
      }

      function updateLlmStatus() {
        el.geminiKeyInput.disabled = !state.llmOptIn;
        el.saveKeyBtn.disabled = !state.llmOptIn;
        el.clearKeyBtn.disabled = !state.llmOptIn;

        if (!state.llmOptIn) {
          el.llmStatus.textContent = "기본 OFF: 외부 API 호출과 과금 방지를 위해 질문 기능이 비활성화되어 있습니다.";
          return;
        }
        if (state.geminiApiKey) {
          el.llmStatus.textContent = "질문 기능 ON: API 키가 브라우저에 저장되어 있습니다.";
          return;
        }
        el.llmStatus.textContent = "질문 기능 ON: API 키를 입력하면 카드별 질문을 사용할 수 있습니다.";
      }

      function initializeLlmControls() {
        el.llmOptIn.checked = state.llmOptIn;
        el.geminiKeyInput.value = state.geminiApiKey;
        updateLlmStatus();

        el.llmOptIn.addEventListener("change", () => {
          state.llmOptIn = el.llmOptIn.checked;
          safeStorageSet(LLM_OPT_IN_STORAGE, state.llmOptIn ? "1" : "0");
          updateLlmStatus();
        });

        el.saveKeyBtn.addEventListener("click", () => {
          if (!state.llmOptIn) {
            updateLlmStatus();
            return;
          }
          state.geminiApiKey = (el.geminiKeyInput.value || "").trim();
          if (state.geminiApiKey) {
            safeStorageSet(API_KEY_STORAGE, state.geminiApiKey);
          } else {
            safeStorageRemove(API_KEY_STORAGE);
          }
          updateLlmStatus();
        });

        el.clearKeyBtn.addEventListener("click", () => {
          state.geminiApiKey = "";
          safeStorageRemove(API_KEY_STORAGE);
          el.geminiKeyInput.value = "";
          updateLlmStatus();
        });
      }

      function initializeInstallControls() {
        const isStandalone =
          window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
        if (isStandalone) {
          el.installBtn.hidden = true;
          el.installHint.textContent = "이미 홈 화면 앱으로 실행 중입니다.";
          return;
        }

        const isIos = /iphone|ipad|ipod/i.test(window.navigator.userAgent || "");
        el.installHint.textContent = isIos
          ? "iOS Safari: 공유 버튼 > 홈 화면에 추가를 눌러 설치하세요."
          : "설치 가능 브라우저에서는 앱 설치 버튼이 표시됩니다.";

        window.addEventListener("beforeinstallprompt", (event) => {
          event.preventDefault();
          state.deferredInstallPrompt = event;
          el.installBtn.hidden = false;
          el.installHint.textContent = "앱으로 설치할 수 있습니다.";
        });

        window.addEventListener("appinstalled", () => {
          state.deferredInstallPrompt = null;
          el.installBtn.hidden = true;
          el.installHint.textContent = "앱 설치가 완료되었습니다.";
        });

        el.installBtn.addEventListener("click", async () => {
          if (!state.deferredInstallPrompt) {
            el.installHint.textContent = "현재 브라우저에서는 자동 설치 창을 사용할 수 없습니다.";
            return;
          }

          const promptEvent = state.deferredInstallPrompt;
          promptEvent.prompt();
          await promptEvent.userChoice;
          state.deferredInstallPrompt = null;
          el.installBtn.hidden = true;
        });
      }

      async function registerServiceWorker() {
        if (!("serviceWorker" in navigator)) return;
        try {
          await navigator.serviceWorker.register("./sw.js");
        } catch {
          // Service worker registration is optional; continue without blocking boot.
        }
      }

      async function fetchJsonWithTimeout(path) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);
        try {
          const response = await fetch(path, { cache: "no-cache", signal: controller.signal });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          return await response.json();
        } finally {
          clearTimeout(timeoutId);
        }
      }

      function getPrimaryTopic(article) {
        if (article?.primary_topic) return article.primary_topic;
        if (Array.isArray(article?.topics) && article.topics.length > 0) {
          return article.topics[0];
        }
        return "기타";
      }

      function groupByTopic(articles) {
        const map = new Map();
        for (const article of articles || []) {
          const topic = getPrimaryTopic(article);
          if (!map.has(topic)) map.set(topic, []);
          map.get(topic).push(article);
        }
        return [...map.entries()].sort((a, b) => b[1].length - a[1].length);
      }

      function scrollToIssue(issue) {
        const cardId = state.issueToCardId.get(issue);
        if (!cardId) return;
        const card = document.getElementById(cardId);
        if (!card) return;
        card.scrollIntoView({ behavior: "smooth", block: "center" });
        card.classList.add("focused");
        setTimeout(() => card.classList.remove("focused"), 1500);
      }

      function renderIssueChips(issuesTop) {
        el.issues.innerHTML = "";
        state.issueToCardId = new Map();

        for (const [issue, count] of issuesTop || []) {
          const chip = document.createElement("button");
          chip.type = "button";
          chip.className = "issue-chip";
          chip.textContent = `${issue} ${count}건`;
          chip.addEventListener("click", () => scrollToIssue(issue));
          el.issues.appendChild(chip);
        }
      }

      function appendMessage(logEl, role, text) {
        const msg = document.createElement("div");
        msg.className = `msg ${role === "user" ? "msg-user" : role === "ai" ? "msg-ai" : "msg-system"}`;
        const content = document.createElement("div");
        content.className = "msg-content";
        if (role === "ai") {
          content.innerHTML = renderMarkdownToHtml(text);
        } else {
          content.innerHTML = `<p>${formatInlineMarkdown(text)}</p>`;
        }
        msg.appendChild(content);
        logEl.appendChild(msg);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function formatInlineMarkdown(raw) {
        let safe = escapeHtml(raw || "");
        safe = safe.replace(/`([^`\n]+)`/g, "<code>$1</code>");
        safe = safe.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        safe = safe.replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
        return safe;
      }

      function renderMarkdownToHtml(raw) {
        const lines = String(raw || "").replace(/\r\n/g, "\n").split("\n");
        const blocks = [];
        let index = 0;

        const isBullet = (line) => /^[-*]\s+/.test(line);
        const isNumbered = (line) => /^\d+\.\s+/.test(line);
        const isHeading = (line) => /^#{1,6}\s+/.test(line);

        while (index < lines.length) {
          const line = lines[index];
          const trimmed = line.trim();
          if (!trimmed) {
            index += 1;
            continue;
          }

          const heading = trimmed.match(/^(#{1,6})\s+(.+)$/);
          if (heading) {
            const depth = Math.min(heading[1].length, 6);
            const tag = depth <= 4 ? "h4" : depth === 5 ? "h5" : "h6";
            blocks.push(`<${tag}>${formatInlineMarkdown(heading[2])}</${tag}>`);
            index += 1;
            continue;
          }

          if (isBullet(trimmed)) {
            const items = [];
            while (index < lines.length && isBullet(lines[index].trim())) {
              items.push(lines[index].trim().replace(/^[-*]\s+/, ""));
              index += 1;
            }
            blocks.push(
              `<ul>${items.map((item) => `<li>${formatInlineMarkdown(item)}</li>`).join("")}</ul>`
            );
            continue;
          }

          if (isNumbered(trimmed)) {
            const items = [];
            while (index < lines.length && isNumbered(lines[index].trim())) {
              items.push(lines[index].trim().replace(/^\d+\.\s+/, ""));
              index += 1;
            }
            blocks.push(
              `<ol>${items.map((item) => `<li>${formatInlineMarkdown(item)}</li>`).join("")}</ol>`
            );
            continue;
          }

          const paragraphLines = [];
          while (index < lines.length) {
            const current = lines[index];
            const currentTrimmed = current.trim();
            if (!currentTrimmed) break;
            if (isHeading(currentTrimmed) || isBullet(currentTrimmed) || isNumbered(currentTrimmed)) {
              break;
            }
            paragraphLines.push(currentTrimmed);
            index += 1;
          }
          blocks.push(
            `<p>${paragraphLines.map((item) => formatInlineMarkdown(item)).join("<br>")}</p>`
          );
        }

        if (blocks.length === 0) {
          return "<p>(응답 없음)</p>";
        }
        return blocks.join("");
      }

      async function askGeminiForArticle(article, question, conversationSummary) {
        if (!state.llmOptIn) {
          return "질문 기능이 꺼져 있습니다. 상단에서 기능 동의를 먼저 켜주세요.";
        }
        if (!state.geminiApiKey) {
          return "Gemini API 키가 설정되지 않았습니다. 상단에서 키를 저장한 뒤 다시 질문해 주세요.";
        }
        if ((question || "").length > MAX_QUESTION_LENGTH) {
          return `질문 길이가 너무 깁니다. ${MAX_QUESTION_LENGTH}자 이하로 줄여 주세요.`;
        }

        const prompt = [
          "너는 AI 뉴스 분석 어시스턴트다.",
          "아래 기사 정보와 일반적인 LLM 지식을 함께 사용해 한국어로 답변해라.",
          "확실하지 않은 내용은 추정이라고 명시해라.",
          "",
          `기사 제목: ${article.title || "-"}`,
          `출처: ${article.source || article.source_name || "-"}`,
          `발행 시각: ${article.published_local || "-"}`,
          `기사 링크: ${article.link || "-"}`,
          `기사 요약: ${article.summary || "-"}`,
          `핵심 키워드: ${(article.keywords || []).join(", ")}`,
          "",
          "직전 대화 요약:",
          conversationSummary || "(없음)",
          "",
          `사용자 질문: ${(question || "").trim()}`,
        ].join("\n");

        const endpoint =
          `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(GEMINI_CHAT_MODEL)}:generateContent?key=${encodeURIComponent(state.geminiApiKey)}`;
        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: {
            temperature: 0.2,
            maxOutputTokens: 1200,
          },
        };
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), GEMINI_TIMEOUT_MS);
        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
            signal: controller.signal,
          });

          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            const message = data?.error?.message || `HTTP ${response.status}`;
            throw new Error(message);
          }

          const text =
            data?.candidates?.[0]?.content?.parts
              ?.map((part) => part?.text || "")
              .join("\n")
              .trim() || "";
          if (!text) {
            throw new Error("LLM 응답이 비어 있습니다.");
          }
          return text;
        } finally {
          clearTimeout(timeoutId);
        }
      }

      function createChatPanel(article) {
        const panel = document.createElement("div");
        panel.className = "chat-panel";
        panel.hidden = true;

        const log = document.createElement("div");
        log.className = "chat-log";
        panel.appendChild(log);
        appendMessage(log, "system", "이 기사에 대해 궁금한 점을 질문해 보세요.");

        const form = document.createElement("div");
        form.className = "chat-form";

        const input = document.createElement("textarea");
        input.className = "chat-input";
        input.placeholder = "예: 이 기사가 실무에 주는 영향은 뭐야?";
        form.appendChild(input);

        const help = document.createElement("div");
        help.className = "chat-help";
        help.textContent = "기사 요약 + 모델 지식을 활용해 답변합니다.";
        form.appendChild(help);

        const sendBtn = document.createElement("button");
        sendBtn.type = "button";
        sendBtn.className = "btn";
        sendBtn.textContent = "질문 전송";
        form.appendChild(sendBtn);
        panel.appendChild(form);

        const history = [];

        const send = async () => {
          const question = (input.value || "").trim();
          if (!question) return;
          appendMessage(log, "user", question);
          input.value = "";
          sendBtn.disabled = true;
          sendBtn.textContent = "답변 생성 중...";

          const summary = history
            .slice(-6)
            .map((item) => `${item.role === "user" ? "사용자" : "어시스턴트"}: ${item.text}`)
            .join("\n");

          try {
            const answer = await askGeminiForArticle(article, question, summary);
            appendMessage(log, "ai", answer);
            history.push({ role: "user", text: question });
            history.push({ role: "assistant", text: answer });
          } catch (err) {
            appendMessage(log, "system", `오류: ${err}`);
          } finally {
            sendBtn.disabled = false;
            sendBtn.textContent = "질문 전송";
          }
        };

        sendBtn.addEventListener("click", send);
        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            send();
          }
        });

        return panel;
      }

      function createArticleCard(article, index) {
        const card = document.createElement("article");
        card.className = "card";
        const cardId = `article-${index + 1}`;
        card.id = cardId;

        for (const issue of article.issues || []) {
          if (!state.issueToCardId.has(issue)) {
            state.issueToCardId.set(issue, cardId);
          }
        }

        const safeTitle = escapeHtml(article.title || "-");
        const articleLink = normalizeHttpUrl(article.link) || "#";
        const safeLink = escapeHtml(articleLink);
        const safeSource = escapeHtml(article.source || article.source_name || "-");
        const safeTime = escapeHtml(article.published_local || "-");
        const safeSummary = escapeHtml(article.summary || "");
        const keywords = (article.keywords || []).map((k) => `<span class="kw">${escapeHtml(k)}</span>`).join("");

        card.innerHTML = `
          <h3 class="card-title"><a href="${safeLink}" target="_blank" rel="noopener noreferrer">${safeTitle}</a></h3>
          <div class="sub">${safeSource} | ${safeTime}</div>
          <p class="summary">${safeSummary}</p>
          <div class="keywords">${keywords}</div>
        `;

        const actions = document.createElement("div");
        actions.className = "card-actions";

        const originBtn = document.createElement("a");
        originBtn.className = "btn";
        originBtn.href = articleLink;
        originBtn.target = "_blank";
        originBtn.rel = "noopener noreferrer";
        originBtn.textContent = "원문 보기";
        actions.appendChild(originBtn);

        const askBtn = document.createElement("button");
        askBtn.type = "button";
        askBtn.className = "btn chat-toggle";
        askBtn.textContent = "질문하기";
        actions.appendChild(askBtn);
        card.appendChild(actions);

        const chatPanel = createChatPanel(article);
        card.appendChild(chatPanel);

        askBtn.addEventListener("click", () => {
          const willOpen = chatPanel.hidden;
          chatPanel.hidden = !willOpen;
          askBtn.textContent = willOpen ? "질문창 닫기" : "질문하기";
        });

        return card;
      }

      function renderTopics(articles) {
        el.topics.innerHTML = "";
        const grouped = groupByTopic(articles);
        let articleIndex = 0;

        for (const [topic, list] of grouped) {
          const section = document.createElement("section");
          section.className = "topic";

          const title = document.createElement("h2");
          title.textContent = `${topic} (${list.length})`;
          section.appendChild(title);

          for (const article of list) {
            const card = createArticleCard(article, articleIndex);
            articleIndex += 1;
            section.appendChild(card);
          }

          el.topics.appendChild(section);
        }
      }

      async function renderHistory() {
        let data = null;
        try {
          data = await fetchJsonWithTimeout("./data/index.json");
          safeStorageSetJson(CACHED_INDEX_STORAGE, data);
        } catch {
          data = safeStorageGetJson(CACHED_INDEX_STORAGE);
        }

        if (!data) {
          el.history.textContent = "";
          return;
        }

        const latestDate = data.latest_date || "-";
        const items = (data.reports || []).slice(0, 7);
        const links = items
          .map((item) => {
            const href = buildSafeReportLink(item.md);
            if (!href) {
              return `<span>${escapeHtml(item.date || "-")}</span>`;
            }
            return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.date || "-")}</a>`;
          })
          .join(" | ");
        el.history.innerHTML = `최근 리포트 (${escapeHtml(latestDate)} 포함): ${links || "-"}`;
      }

      function renderLatestReport(data, isCached = false) {
        const generatedAtKst = formatGeneratedAtKst(data.generated_at);
        const generatedAtUtc = data.generated_at || "-";

        el.meta.innerHTML = `
          <span class="meta-pill">Report date: ${escapeHtml(data.report_date || "-")}</span>
          <span class="meta-pill">Article count: ${escapeHtml(String(data.article_count ?? 0))}</span>
          <span class="meta-pill" title="UTC: ${escapeHtml(generatedAtUtc)}">Generated at (KST): ${escapeHtml(generatedAtKst)}</span>
          ${isCached ? '<span class="meta-pill">Offline cache mode</span>' : ""}
        `;

        renderIssueChips(data.issues_top || []);
        renderTopics(data.articles || []);
      }

      async function boot() {
        initializeInstallControls();
        initializeLlmControls();
        await registerServiceWorker();

        try {
          const data = await fetchJsonWithTimeout("./data/latest.json");
          safeStorageSetJson(CACHED_LATEST_STORAGE, data);
          renderLatestReport(data, false);
          el.errorBox.innerHTML = "";
          await renderHistory();
        } catch (err) {
          const cached = safeStorageGetJson(CACHED_LATEST_STORAGE);
          if (cached) {
            renderLatestReport(cached, true);
            el.errorBox.innerHTML = `<div class="err">네트워크 오류로 캐시된 리포트를 표시 중입니다: ${escapeHtml(String(err))}</div>`;
            await renderHistory();
            return;
          }

          el.meta.innerHTML = `<span class="meta-pill">로딩 실패</span>`;
          el.errorBox.innerHTML = `<div class="err">리포트를 불러오지 못했습니다: ${escapeHtml(String(err))}</div>`;
        }
      }

      boot();
    </script>
  </body>
</html>
