<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daily AI Brief - 오프라인</title>
    <style>
      :root {
        --bg-1: #07121f;
        --bg-2: #0e1f35;
        --line: rgba(255, 255, 255, 0.2);
        --text: #eef5ff;
        --muted: #a8bad3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
        color: var(--text);
        font-family: "Pretendard", "SUIT", "Noto Sans KR", "Segoe UI", sans-serif;
        background:
          radial-gradient(1000px 420px at 10% -10%, rgba(52, 211, 153, 0.22), transparent),
          radial-gradient(1000px 460px at 90% -5%, rgba(125, 211, 252, 0.24), transparent),
          linear-gradient(145deg, var(--bg-1), var(--bg-2));
      }

      .panel {
        width: min(520px, 92vw);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.07);
      }

      h1 {
        margin: 0;
        font-size: 1.18rem;
      }

      p {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        display: inline-block;
        margin-top: 14px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 12px;
        color: var(--text);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>오프라인 상태입니다</h1>
      <p>네트워크 연결이 복구되면 최신 브리프를 자동으로 불러옵니다.</p>
      <a href="./">다시 시도</a>
    </main>
  </body>
</html>
