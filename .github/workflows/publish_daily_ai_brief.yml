name: Publish Daily AI Brief

on:
  workflow_dispatch:
  schedule:
    # Weekdays 08:27 KST = 23:27 UTC (Sun-Thu)
    - cron: "27 23 * * 0-4"

permissions:
  contents: write

jobs:
  run-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_daily_agent.txt

      - name: Generate daily report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python daily_ai_news_agent.py \
            --config daily_ai_agent_config.json \
            --output-dir docs/data \
            --target-articles 10 \
            --max-total-articles 10

      - name: Publish latest aliases
        run: |
          python scripts/publish_latest_report.py --input-dir docs/data

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: publish daily AI brief"
            git push
          fi

      - name: Send email brief
        env:
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_USER: ${{ secrets.EMAIL_SMTP_USER }}
          EMAIL_SMTP_PASSWORD: ${{ secrets.EMAIL_SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          REPORT_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: |
          python scripts/send_daily_report_email.py --input-dir docs/data
